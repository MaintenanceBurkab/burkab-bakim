<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Login Test</title>
  <style>
    .login-field { margin: 10px 0; }
    .login-err { color: red; display: none; }
    #loginScreen { padding: 20px; border: 1px solid #ccc; width: 300px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-field">
    <label>Kullanıcı Adı</label>
    <input type="text" id="loginUser" placeholder="kullanici.adi" autocapitalize="none" autocomplete="off">
  </div>
  <div class="login-field">
    <label>Şifre / PIN</label>
    <input type="password" id="loginPass" placeholder="••••" autocomplete="current-password">
  </div>
  <button class="login-btn" id="loginBtn">GİRİŞ YAP</button>
  <div class="login-err" id="loginErr">Kullanıcı adı veya şifre hatalı.</div>
</div>

<div id="welcomeScreen" style="display:none;">
  <p>Hoş geldin <span id="userNm"></span>!</p>
</div>

<script>
const USERS = [
  { Kullanıcı:'admin', password:'1234', name:'MEHMET ERTURK', role:'admin' },
  { Kullanıcı:'enes', password:'1111', name:'ENES BALKAN', role:'bakim' },
  { Kullanıcı:'ferhat', password:'2222', name:'FERHAT OKTAY', role:'bakim' },
  { Kullanıcı:'savci', password:'3333', name:'SUNAY AVCI', role:'bakim' },
  { Kullanıcı:'cemal', password:'4444', name:'CEMAL ÖZMISIR', role:'bakim' },
  { Kullanıcı:'ahmet', password:'5555', name:'AHMET ALTIPARMAK', role:'bakim' },
  { Kullanıcı:'volkan', password:'6666', name:'VOLKAN AKAR', role:'bakim' },
  { Kullanıcı:'yunus', password:'7777', name:'YUNUS DİKGÖZ', role:'bakim' },
  { Kullanıcı:'uretim', password:'8888', name:'ÜRETİM', role:'bakim' },
  { Kullanıcı:'planlama', password:'9999', name:'PLANLAMA', role:'bakim' },
];

let currentUser = null;

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => {
  if(e.key==='Enter') doLogin();
});

function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value.trim();

  const found = USERS.find(x => x.Kullanıcı.toLowerCase() === u && x.password === p);

  if (!found) {
    document.getElementById('loginErr').style.display = 'block';
    return;
  }

  currentUser = found;
  sessionStorage.setItem('burkab_user', JSON.stringify(found));

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('welcomeScreen').style.display = 'block';
  document.getElementById('userNm').textContent = found.name;
}
</script>

</body>
</html>
